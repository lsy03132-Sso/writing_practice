<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바른 글씨 쓰기 학습지 생성기</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- html2pdf.js (PDF 다운로드용) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        
        @font-face {
            font-family: 'GyeonggiBatang';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/GyeonggiBatang.woff') format('woff');
            font-weight: normal; font-style: normal;
        }
        @font-face {
            font-family: 'KyoboHandwriting2019';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/KyoboHandwriting2019.woff') format('woff');
            font-weight: normal; font-style: normal;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #f3f4f6;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        .preview-container {
            width: 100%; height: 100vh; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 1rem; box-sizing: border-box;
        }

        /* 크기 전환 시 애니메이션 제거 (스케일 오류 방지) */
        .a4-paper {
            background: white; padding: 15mm 15mm; box-shadow: 0 10px 25px rgba(0,0,0,0.15); box-sizing: border-box; position: relative; flex-shrink: 0;
        }

        /* 세로형 / 가로형 규격 */
        .a4-paper.portrait { width: 210mm; min-height: 297mm; }
        .a4-paper.landscape { width: 297mm; min-height: 210mm; }
        
        /* PDF 다운로드 시 다중 페이지 넘김 처리용 */
        .page-break { page-break-before: always; }

        @media (max-width: 800px) { 
            .preview-container { justify-content: flex-start; padding: 1rem; } 
        }

        .grid-container {
            display: grid; border-top: 2px solid #000; border-left: 2px solid #000; width: 100%; background-color: transparent;
        }

        .han-cell {
            position: relative; aspect-ratio: 1 / 1; border-right: 2px solid #000; border-bottom: 2px solid #000; box-sizing: border-box;
        }

        .han-cell::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; border-top: 1px dashed var(--grid-color); transform: translateY(-50%); z-index: 1; }
        .han-cell::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; border-left: 1px dashed var(--grid-color); transform: translateX(-50%); z-index: 1; }

        .han-char {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; line-height: 1;
        }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #2563eb; cursor: pointer; margin-top: -6px; }
